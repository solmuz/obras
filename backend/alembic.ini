# Alembic Configuration File
# the asyncio.proxyqueue module doesn't work, we're removing it from the
# consumed engine arguments.
# detects changes to databases that occur during the test suite and automatically
# resets the database snapshots between tests.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s_%%(ts)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field that'sased off of a commit
# message.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# reporting on partially modified files
# file_template = %%(rev)s_%%(slug)s

# format of migration files
# leave empty for not rendering "Mybranch" in the filename.
# branch_labels =

# indicates the beginning of the "main" branch of revisions.
# target_metadata = None

# this collection is used in :meth: `alembic.operations.Operations.get_context`
# to produce a list of "down" migrations associated with each revision generated.
# see the documentation on :class: `alembic.autogenerate.compare_metadata`
# to understand how these get generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
